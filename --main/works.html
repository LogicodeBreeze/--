<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品</title>
  <meta name="description" content="作品页示例，使用无卡片排版展示内容。">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site-header">
  <div class="wrap nav">
    <a class="brand" href="index.html">慢一点</a>
    <nav class="nav-links">
      <a href="index.html">首页</a>
      <a class="active" href="works.html">作品</a>
      <a href="journal.html">札记</a>
      <a href="contact.html">联系</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="wrap grid-2">
      <div>
        <div class="eyebrow">Works</div>
        <h1>作品展示。</h1>
      </div>
      <div class="muted-box">
        <p>这里演示的是“作品目录 + 简述”的展示方式。</p>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <img class="feature-image" src="assets/cover.svg" alt="作品页顶部抽象视觉图">
    </div>
  </section>

  <section class="section">
    <div class="wrap list">
      <div class="list-row">
        <div class="meta">A / 01</div>
        <div>
          <h3>晨间页面</h3>
          <p>一个适合写清晨计划与短笔记的单页页面，重点在节奏和留白，而不是组件数量。你可以把它改成自我介绍、项目背景或活动说明。</p>
        </div>
      </div>
      <div class="list-row">
        <div class="meta">B / 02</div>
        <div>
          <h3>文字展板</h3>
          <p>把大段文字拆成小标题、说明和短句，形成更耐读的结构。适合课程作业、书单展示、品牌文案等内容。</p>
        </div>
      </div>
      <div class="list-row">
        <div class="meta">C / 03</div>
        <div>
          <h3>静态作品集</h3>
          <p>用最少的交互呈现你真正想被看见的内容：图、题目、简介，以及一种稳定、干净的观看感受。</p>
        </div>
      </div>
    </div>
  </section>

  <section class="banner">
    <div class="wrap">
      <div class="eyebrow">More</div>
      <h2>课程项目、摄影作品、设计稿展示页。</h2>
      <a class="button-line" href="journal.html"><span></span>继续看札记页</a>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="wrap">作品页示例 </div>
</footer>
<script src="assets/script.js"></script>
</body>
</html>
