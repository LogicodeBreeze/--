<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>札记｜慢一点</title>
  <meta name="description" content="札记页示例，适合写短文、想法、项目记录。">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site-header">
  <div class="wrap nav">
    <a class="brand" href="index.html">慢一点</a>
    <nav class="nav-links">
      <a href="index.html">首页</a>
      <a href="works.html">作品</a>
      <a class="active" href="thought.html">札记</a>
      <a href="contact.html">联系</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="wrap grid-2">
      <div>
        <div class="eyebrow">Journal</div>
        <h1>一些短想法</h1>
      </div>
      <div>
        <p>这一页是给“文字”准备的。，只有标题、时间、段落和呼吸感。</p>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="wrap">
      <article class="note">
        <div class="note-title">
          <h3>无限可能</h3>
          
        </div>
        <p>你的上限取决于你对自己的定义。</p>
      </article>

      <article class="note">
        <div class="note-title">
          <h3>主动掌控”</h3>
          
        </div>
        <p>留我今天的行动，是通往明天梦想的基石。</p>
      </article>

      <article class="note">
        <div class="note-title">
          <h3>内心力量</h3>
        
        </div>
        <p>稳健的内核是应对一切的底气。</p>
      </article>
    </div>
  </section>

  <section class="banner">
    <div class="wrap">
      <div class="eyebrow">Message</div>
      <h2>你以后只需要替换这些文字，就能变成自己的站点内容。</h2>
      <a class="button-line" href="contact.html"><span></span>打开联系页</a>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="wrap">札记页示例 · 更适合文字表达</div>
</footer>
<script src="assets/script.js"></script>
</body>
</html>
